version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/database/queries/"
    schema: "internal/database/schema.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/database/dbgen"
        output_files_suffix: ".gen"
        output_db_file_name: "db.gen.go"
        output_models_file_name: "models.gen.go"
