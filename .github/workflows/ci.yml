name: CI

on:
  push:

permissions:
  id-token: write
  # go-toolchain's dependency-graph submission POSTs a snapshot and fails
  # without write; its no-all-builds guard scans check runs.
  contents: write
  actions: read
  checks: read
  # Required by the publish-ghcr reusable workflow to push the image to GHCR.
  # A reusable workflow cannot exceed the caller's permissions, so it must be
  # declared here.
  packages: write

jobs:
  sqlc-check:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlc
        run: |
          curl -fsSL https://github.com/sqlc-dev/sqlc/releases/download/v1.28.0/sqlc_1.28.0_linux_amd64.tar.gz | tar xz
          sudo mv sqlc /usr/local/bin/
      - name: Check sqlc generated code is up to date
        run: |
          sqlc generate
          if [ -n "$(git diff -- internal/database/dbgen/)" ]; then
            echo "::error::sqlc generated code is out of date. Run 'sqlc generate' and commit the changes."
            git diff -- internal/database/dbgen/
            exit 1
          fi

  # The dashboard front-end is authored in TypeScript (internal/api/web/src/*.ts)
  # and compiled to internal/api/web/assets/*.js, which is committed (a generated
  # artifact) and embedded into the Go binary. This job wipes the generated .js
  # (assets/style.css is hand-written and must survive the wipe), recompiles from
  # source with the locked toolchain (npm ci pins tsc via package-lock.json), and
  # fails on ANY divergence from what is committed: stale output, an emitted file
  # never committed, or an orphaned .js whose .ts was deleted/renamed — the wipe
  # is what exposes orphans, since a rebuild alone never removes them.
  web-check:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Wipe generated JS so orphans of deleted/renamed .ts files surface
        run: find internal/api/web/assets -name '*.js' -delete
      - run: npm run build
      - name: Verify compiled dashboard JS is committed and up to date
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            const res = await exec.getExecOutput("git", ["status", "--porcelain", "--", "internal/api/web/assets"], { silent: true });
            if (res.stdout.trim() !== "") {
              core.info("Divergent files (M = stale committed JS, ?? = emitted but never committed, D = orphan of a deleted/renamed .ts):");
              core.info(res.stdout);
              await exec.exec("git", ["--no-pager", "diff", "--", "internal/api/web/assets"]);
              core.setFailed("Compiled dashboard JS diverges from the TypeScript source. Run `npm run build` and commit internal/api/web/assets/ (git rm any orphaned .js).");
            } else {
              core.info("Dashboard JS is in sync with the TypeScript source.");
            }

  build:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      # go-toolchain@v1 itself cache-uploads build/ as the `go-build` hand-off
      # on every run, and its cache key is once-per-run (NOT job-disambiguated),
      # so publish-ghcr just cache-downloads it. Do NOT add an explicit
      # `cache-upload go-build` step here — a second same-run upload of that
      # name collides on the key and fails.
      - uses: wow-look-at-my/go-toolchain@v1

  # Build the Docker image and push ghcr.io/wow-look-at-my/github-state-mirror:latest
  # on master. Restores the go-build hand-off (server_linux_amd64) the build job
  # cache-uploaded and feeds it to the Dockerfile, then prunes old GHCR versions.
  publish-ghcr:
    needs: build
    uses: wow-look-at-my/actions/.github/workflows/publish-ghcr.yml@master

  # Deploy a standalone, backend-free styling preview of the dashboard to
  # buildhost as a per-branch static site, served at
  # https://sites.pazer.build/github-state-mirror/branch/<branch>/. The preview
  # injects demo-data.js so the page renders canned data (login/user/admin views)
  # without a real server. OIDC handles auth; no static token is needed.
  preview:
    needs: web-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Assemble the demo bundle
        id: bundle
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            const webDir = "internal/api/web";
            const dist = "dist";
            fs.mkdirSync(`${dist}/assets`, { recursive: true });

            // Inject the preview-only demo-data.js before app.js so the page
            // renders canned data instead of calling the (absent) backend.
            const appTag = '<script type="module" src="assets/app.js"></script>';
            const demoTag = '<script type="module" src="assets/demo-data.js"></script>';
            let html = fs.readFileSync(`${webDir}/index.html`, "utf8");
            html = html.replace(appTag, `${demoTag}\n    ${appTag}`);
            fs.writeFileSync(`${dist}/index.html`, html);

            for (const f of ["app.js", "rate-meter.js", "timeline.js", "style.css", "demo-data.js"]) {
              fs.copyFileSync(`${webDir}/assets/${f}`, `${dist}/assets/${f}`);
            }

            // buildhost serves sites under a single path segment, so the branch
            // name must not contain '/'. Flatten anything outside [A-Za-z0-9._-].
            const raw = github.ref_name || "preview";
            const branch = raw.replace(/[^A-Za-z0-9._-]/g, "-");
            core.setOutput("branch", branch);
            core.info(`Prepared dist/ for branch '${branch}'.`);
      - name: Publish preview to buildhost
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish-site@master
        with:
          server: https://pazer.build
          project: github-state-mirror
          branch: ${{ steps.bundle.outputs.branch }}
          source_dir: ./dist
