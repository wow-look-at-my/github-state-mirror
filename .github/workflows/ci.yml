name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and run go-toolchain
        run: |
          curl -fsSL -o go-toolchain https://github.com/wow-look-at-my/go-toolchain/releases/latest/download/go-toolchain_linux_amd64
          chmod +x go-toolchain
          ./go-toolchain
